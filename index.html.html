<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duel Audio: Crystal Secret Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=JetBrains+Mono:wght@700&display=swap');

        :root {
            --p1-color: #06b6d4;
            --p2-color: #f43f5e;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #0f172a, #020617);
            color: #f8fafc;
            overflow: hidden;
            user-select: none;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .choice-card {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Blind Selection Style: Hanya indikator status, tombol tidak berubah visual agar lawan tidak tahu */
        .blind-selected-indicator { 
            border: 2px solid rgba(255, 255, 255, 0.3) !important;
        }

        .correct-reveal { background: #22c55e !important; color: white !important; transform: scale(1.05); border-color: #4ade80 !important; }
        .wrong-reveal { background: #ef4444 !important; color: white !important; opacity: 0.7; }

        .point-popup {
            position: absolute;
            animation: pointUp 1.5s ease-out forwards;
            font-weight: 900;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes pointUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        #game-screen, #result-screen { display: none; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <!-- MENU SCREEN -->
    <div id="menu-screen" class="flex-1 flex flex-col items-center justify-center p-6 text-center z-10">
        <div class="animate__animated animate__fadeInDown">
            <h1 class="text-7xl md:text-9xl font-black mb-2 bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-500">MATH</h1>
            <h1 class="text-5xl md:text-7xl font-black mb-8 text-amber-500 tracking-widest">DUEL</h1>
        </div>

        <button onclick="startGame()" class="group relative px-12 py-5 bg-white text-black font-black text-2xl rounded-full overflow-hidden transition-all hover:scale-110 active:scale-95">
            <span class="relative z-10">MULAI DUEL</span>
            <div class="absolute inset-0 bg-amber-500 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
        </button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="flex-1 flex flex-col relative overflow-hidden">
        <!-- Timer UI -->
        <div class="absolute top-0 left-0 w-full h-1 bg-slate-900 z-50">
            <div id="timer-bar" class="h-full bg-gradient-to-r from-amber-500 to-yellow-300 shadow-[0_0_15px_rgba(245,158,11,0.5)] transition-all duration-100" style="width: 100%"></div>
        </div>

        <div class="flex-1 flex">
            <!-- P1 ZONE -->
            <div id="p1-zone" class="w-1/2 flex flex-col p-8 relative transition-all duration-700">
                <div class="flex items-center gap-4 mb-10">
                    <div class="w-16 h-16 rounded-2xl bg-cyan-500/20 border border-cyan-500/50 flex items-center justify-center text-2xl font-black text-cyan-500">P1</div>
                    <div>
                        <div class="text-xs uppercase tracking-widest text-cyan-500/60 font-bold">Score</div>
                        <div id="score-p1" class="text-4xl font-black mono">0.00</div>
                    </div>
                </div>
                <div id="p1-choices" class="flex-1 flex flex-col justify-center gap-4 opacity-0 scale-90 transition-all duration-500"></div>
                <div id="p1-status" class="text-center text-sm font-bold tracking-widest text-cyan-500/30 py-4 uppercase italic">Bersiap...</div>
            </div>

            <!-- P2 ZONE -->
            <div id="p2-zone" class="w-1/2 flex flex-col p-8 relative transition-all duration-700 border-l border-white/5">
                <div class="flex items-center justify-end gap-4 mb-10 text-right">
                    <div>
                        <div class="text-xs uppercase tracking-widest text-rose-500/60 font-bold">Score</div>
                        <div id="score-p2" class="text-4xl font-black mono">0.00</div>
                    </div>
                    <div class="w-16 h-16 rounded-2xl bg-rose-500/20 border border-rose-500/50 flex items-center justify-center text-2xl font-black text-rose-500">P2</div>
                </div>
                <div id="p2-choices" class="flex-1 flex flex-col justify-center gap-4 opacity-0 scale-90 transition-all duration-500"></div>
                <div id="p2-status" class="text-center text-sm font-bold tracking-widest text-rose-500/30 py-4 uppercase italic">Bersiap...</div>
            </div>
        </div>

        <!-- Central Display -->
        <div class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center">
            <div id="central-status" class="w-52 h-52 rounded-full glass flex flex-col items-center justify-center border-2 border-white/10 animate__animated">
                <div id="central-icon" class="text-7xl mb-2">⏳</div>
                <div id="central-msg" class="text-[10px] font-black tracking-[0.3em] text-white/50 uppercase text-center px-4">Ready?</div>
            </div>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="flex-1 flex flex-col items-center justify-center p-6 bg-slate-950">
        <h2 class="text-slate-500 font-black tracking-[0.5em] mb-4">MATCH FINISHED</h2>
        <div id="winner-text" class="text-7xl font-black mb-16 text-white drop-shadow-2xl">P1 WINS</div>
        <div class="flex gap-32 mb-20">
            <div class="text-center">
                <div class="text-cyan-500 font-bold mb-4 uppercase tracking-widest">Player 1</div>
                <div id="final-p1" class="text-6xl font-black mono">0.00</div>
            </div>
            <div class="text-center">
                <div class="text-rose-500 font-bold mb-4 uppercase tracking-widest">Player 2</div>
                <div id="final-p2" class="text-6xl font-black mono">0.00</div>
            </div>
        </div>
        <button onclick="location.reload()" class="px-12 py-4 bg-white text-black rounded-full font-black tracking-widest hover:invert transition-all scale-125">MAIN LAGI</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const synth = window.speechSynthesis;

        let state = {
            round: 1,
            totalRounds: 5,
            scores: { p1: 0, p2: 0 },
            currentAnswer: 0,
            choices: [],
            p1Selection: null,
            p2Selection: null,
            p1Time: 0,
            p2Time: 0,
            phase: 'menu',
            timer: 0,
            timerMax: 5000,
            interval: null
        };

        function playTone(f, type, d, v=0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function playSFX(type) {
            if(type === 'tick') playTone(800, 'sine', 0.05, 0.02);
            if(type === 'correct') { playTone(600, 'sine', 0.1); setTimeout(() => playTone(900, 'sine', 0.2), 50); }
            if(type === 'wrong') playTone(150, 'sawtooth', 0.3, 0.1);
            if(type === 'pop') playTone(1000, 'sine', 0.1, 0.05);
        }

        function createChoicesUI() {
            const containers = [document.getElementById('p1-choices'), document.getElementById('p2-choices')];
            containers.forEach((container, pIdx) => {
                container.innerHTML = '';
                for(let i=0; i<3; i++) {
                    const btn = document.createElement('button');
                    btn.className = `choice-card w-full glass p-6 rounded-2xl text-4xl font-black mono flex items-center justify-center group relative overflow-hidden`;
                    btn.innerHTML = `<span class="val">-</span>`;
                    btn.onclick = () => handleChoice(pIdx + 1, i);
                    container.appendChild(btn);
                }
            });
        }

        function startGame() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            createChoicesUI();
            startNewRound();
        }

        async function startNewRound() {
            state.phase = 'preparing';
            state.p1Selection = state.p2Selection = null;
            state.p1Time = state.p2Time = 0;
            
            // UI Reset
            document.getElementById('p1-choices').classList.replace('opacity-100', 'opacity-0');
            document.getElementById('p2-choices').classList.replace('opacity-100', 'opacity-0');
            document.getElementById('p1-choices').classList.add('scale-90');
            document.getElementById('p2-choices').classList.add('scale-90');
            
            // Bersihkan sisa-sisa kelas reveal dari ronde sebelumnya
            [document.getElementById('p1-choices'), document.getElementById('p2-choices')].forEach(container => {
                Array.from(container.children).forEach(card => {
                    card.classList.remove('correct-reveal', 'wrong-reveal', 'blind-selected-indicator');
                    card.style.opacity = "1";
                });
            });

            document.getElementById('p1-status').innerText = "Bersiap...";
            document.getElementById('p2-status').innerText = "Bersiap...";
            document.getElementById('central-icon').innerText = "⏳";
            document.getElementById('central-msg').innerText = "Get Ready";
            document.getElementById('timer-bar').style.width = '100%';
            
            // Jeda sebelum soal
            await new Promise(r => setTimeout(r, 1000));
            document.getElementById('central-msg').innerText = "Listen Closely";
            document.getElementById('central-icon').innerText = "🎙️";
            playSFX('pop');
            await new Promise(r => setTimeout(r, 1000));

            state.phase = 'listening';
            const q = generateLogic();
            state.currentAnswer = q.ans;
            state.choices = q.choices;

            const speak = new SpeechSynthesisUtterance(q.text);
            speak.lang = 'id-ID';
            speak.rate = 1.0; // Sedikit lebih lambat agar angka sulit terdengar jelas
            speak.onend = () => setTimeout(startDecisionPhase, 500);
            synth.speak(speak);
        }

        function generateLogic() {
            let a, b, c, text, ans;
            const mode = Math.random();
            
            // Logika lebih sulit (Advanced Hard)
            if (mode < 0.5) { 
                // Mode: (A x B) +/- C dengan angka lebih besar
                a = Math.floor(Math.random() * 8) + 6; // 6-13
                b = Math.floor(Math.random() * 7) + 4; // 4-10
                c = Math.floor(Math.random() * 25) + 11; // 11-35
                const op = Math.random() > 0.5 ? 'tambah' : 'kurang';
                ans = (op === 'tambah') ? (a * b) + c : (a * b) - c;
                text = `${a} kali ${b}, ${op} ${c}`;
            } else {
                // Mode: Rantai 3 angka (A +/- B +/- C) dengan angka puluhan
                a = Math.floor(Math.random() * 50) + 30; // 30-79
                b = Math.floor(Math.random() * 40) + 15; // 15-54
                c = Math.floor(Math.random() * 30) + 10; // 10-39
                const op1 = Math.random() > 0.5 ? 'tambah' : 'kurang';
                const op2 = Math.random() > 0.5 ? 'tambah' : 'kurang';
                ans = op1 === 'tambah' ? a + b : a - b;
                ans = op2 === 'tambah' ? ans + c : ans - c;
                text = `${a}, ${op1} ${b}, ${op2} ${c}`;
            }

            let choices = [ans];
            while(choices.length < 3) {
                // Jebakan: angka yang mirip dengan jawaban asli
                let offset = (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 5) + 1);
                if (Math.random() > 0.7) offset = (Math.random() > 0.5 ? 10 : -10); // Jebakan beda puluhan
                
                let w = ans + offset;
                if(!choices.includes(w)) choices.push(w);
            }
            return { text, ans, choices: choices.sort(() => Math.random() - 0.5) };
        }

        function startDecisionPhase() {
            state.phase = 'choosing';
            state.timer = state.timerMax;
            
            document.getElementById('central-icon').innerText = "⚡";
            document.getElementById('central-msg').innerText = "Pick One!";
            
            const p1Vals = document.getElementById('p1-choices').querySelectorAll('.val');
            const p2Vals = document.getElementById('p2-choices').querySelectorAll('.val');
            state.choices.forEach((val, i) => {
                p1Vals[i].innerText = val;
                p2Vals[i].innerText = val;
            });

            document.getElementById('p1-choices').classList.replace('opacity-0', 'opacity-100');
            document.getElementById('p1-choices').classList.remove('scale-90');
            document.getElementById('p2-choices').classList.replace('opacity-0', 'opacity-100');
            document.getElementById('p2-choices').classList.remove('scale-90');
            
            playSFX('pop');

            const start = Date.now();
            state.interval = setInterval(() => {
                const now = Date.now();
                state.timer = state.timerMax - (now - start);
                const perc = Math.max(0, (state.timer / state.timerMax) * 100);
                document.getElementById('timer-bar').style.width = perc + '%';

                if(perc < 25) playSFX('tick');

                if(state.timer <= 0 || (state.p1Selection !== null && state.p2Selection !== null)) {
                    clearInterval(state.interval);
                    revealResults();
                }
            }, 50);
        }

        function handleChoice(player, index) {
            if(state.phase !== 'choosing') return;
            if(player === 1 && state.p1Selection === null) {
                state.p1Selection = index;
                state.p1Time = state.timer;
                document.getElementById('p1-status').innerText = "Locked In";
                playSFX('tick');
            }
            if(player === 2 && state.p2Selection === null) {
                state.p2Selection = index;
                state.p2Time = state.timer;
                document.getElementById('p2-status').innerText = "Locked In";
                playSFX('tick');
            }
        }

        function revealResults() {
            state.phase = 'revealing';
            document.getElementById('central-icon').innerText = "🏁";
            document.getElementById('central-msg').innerText = "Reveal";

            const p1Correct = state.p1Selection !== null && state.choices[state.p1Selection] === state.currentAnswer;
            const p2Correct = state.p2Selection !== null && state.choices[state.p2Selection] === state.currentAnswer;

            const p1Points = p1Correct ? (state.p1Time / 100) : 0;
            const p2Points = p2Correct ? (state.p2Time / 100) : 0;

            state.scores.p1 += p1Points;
            state.scores.p2 += p2Points;

            const correctIdx = state.choices.indexOf(state.currentAnswer);
            
            [1, 2].forEach(p => {
                const container = document.getElementById(`p${p}-choices`);
                const selection = p === 1 ? state.p1Selection : state.p2Selection;
                const isCorrect = p === 1 ? p1Correct : p2Correct;
                const points = p === 1 ? p1Points : p2Points;

                Array.from(container.children).forEach((card, idx) => {
                    card.style.opacity = "1";
                    if(idx === correctIdx) {
                        card.classList.add('correct-reveal');
                    } else if(idx === selection && !isCorrect) {
                        card.classList.add('wrong-reveal');
                    } else {
                        card.style.opacity = '0.1';
                    }
                });

                if(points > 0) {
                    const zone = document.getElementById(p === 1 ? 'p1-zone' : 'p2-zone');
                    const popup = document.createElement('div');
                    popup.className = `point-popup text-4xl ${p === 1 ? 'text-cyan-400' : 'text-rose-400'}`;
                    popup.innerText = `+${points.toFixed(2)}`;
                    popup.style.left = '50%'; popup.style.top = '40%';
                    zone.appendChild(popup);
                    setTimeout(() => popup.remove(), 1500);
                }
            });

            document.getElementById('score-p1').innerText = state.scores.p1.toFixed(2);
            document.getElementById('score-p2').innerText = state.scores.p2.toFixed(2);
            playSFX(p1Correct || p2Correct ? 'correct' : 'wrong');

            setTimeout(() => {
                if(state.round < state.totalRounds) {
                    state.round++;
                    startNewRound();
                } else {
                    showEnd();
                }
            }, 3500);
        }

        function showEnd() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('final-p1').innerText = state.scores.p1.toFixed(2);
            document.getElementById('final-p2').innerText = state.scores.p2.toFixed(2);
            const win = state.scores.p1 > state.scores.p2 ? "P1 MENANG" : (state.scores.p2 > state.scores.p1 ? "P2 MENANG" : "SERI");
            document.getElementById('winner-text').innerText = win;
            document.getElementById('winner-text').style.color = state.scores.p1 > state.scores.p2 ? '#06b6d4' : '#f43f5e';
        }

        window.addEventListener('keydown', (e) => {
            if(state.phase !== 'choosing') return;
            if(e.key === '1') handleChoice(1, 0);
            if(e.key === '2') handleChoice(1, 1);
            if(e.key === '3') handleChoice(1, 2);
            if(e.code === 'Numpad1') handleChoice(2, 0);
            if(e.code === 'Numpad2') handleChoice(2, 1);
            if(e.code === 'Numpad3') handleChoice(2, 2);
        });
    </script>
</body>
</html>
